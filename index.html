<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JP Cards">
<meta name="theme-color" content="#1e3a5f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>JP Flashcards</title>
<style>
:root {
  --bg: #0f172a;
  --bg2: #1e293b;
  --bg3: #334155;
  --card-f: #1e293b;
  --card-b: #0f2744;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #64748b;
  --border: rgba(255,255,255,0.1);
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.15);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.15);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.15);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.15);
  --purple: #a855f7;
  --purple-bg: rgba(168,85,247,0.15);
  --accent: #38bdf8;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

#app { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); padding-bottom: var(--safe-bot); }

/* ── HEADER ── */
header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px 8px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.logo { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
.hcontrols { display: flex; gap: 8px; margin-left: auto; align-items: center; }
select {
  font-size: 12px; padding: 5px 8px; border-radius: 8px;
  border: 0.5px solid var(--border); background: var(--bg2);
  color: var(--text); cursor: pointer; appearance: none; -webkit-appearance: none;
}
.icon-btn {
  width: 34px; height: 34px; border-radius: 8px;
  border: 0.5px solid var(--border); background: var(--bg2);
  color: var(--text2); cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.icon-btn:active { opacity: 0.7; transform: scale(0.95); }

/* ── STATS ── */
.stats {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; padding: 10px 16px; flex-shrink: 0;
}
.stat {
  border-radius: 10px; padding: 8px 4px; text-align: center;
  border: 0.5px solid var(--border);
}
.stat.s-got { background: var(--green-bg); }
.stat.s-not { background: var(--red-bg); }
.stat.s-rem { background: var(--blue-bg); }
.stat-n { font-size: 22px; font-weight: 600; }
.stat.s-got .stat-n { color: var(--green); }
.stat.s-not .stat-n { color: var(--red); }
.stat.s-rem .stat-n { color: var(--blue); }
.stat-l { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ── CARD AREA ── */
.card-area {
  flex: 1; padding: 0 16px; display: flex;
  flex-direction: column; justify-content: center;
  min-height: 0;
}
.scene { perspective: 1100px; width: 100%; height: 220px; cursor: pointer; }
.flipper {
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform 0.45s cubic-bezier(.4,0,.2,1);
  position: relative;
}
.flipper.flipped { transform: rotateY(180deg); }
.face {
  position: absolute; inset: 0;
  backface-visibility: hidden; -webkit-backface-visibility: hidden;
  border-radius: 18px; border: 0.5px solid var(--border);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px; padding: 20px; text-align: center;
  user-select: none;
}
.face-f { background: var(--card-f); }
.face-b { background: var(--card-b); transform: rotateY(180deg); }

.f-badge {
  font-size: 11px; font-weight: 600; padding: 3px 12px;
  border-radius: 20px; margin-bottom: 4px;
}
.f-word { font-size: 42px; font-weight: 700; line-height: 1.15; word-break: break-all; }
.f-hint { font-size: 12px; color: var(--text3); }
.b-kana { font-size: 18px; font-weight: 500; color: var(--accent); }
.b-meaning { font-size: 20px; font-weight: 600; line-height: 1.3; color: var(--text); }
.b-exlabel { font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: .6px; text-transform: uppercase; margin-top: 4px; }
.b-ex { font-size: 13px; color: var(--text2); max-width: 100%; line-height: 1.6; }

/* badge colors per category */
.cat-automotive { background: rgba(59,130,246,.2); color: #93c5fd; }
.cat-software   { background: rgba(34,197,94,.2);  color: #86efac; }
.cat-protocol   { background: rgba(245,158,11,.2); color: #fcd34d; }
.cat-linux      { background: rgba(168,85,247,.2); color: #d8b4fe; }
.cat-safety     { background: rgba(239,68,68,.2);  color: #fca5a5; }
.cat-business   { background: rgba(20,184,166,.2); color: #5eead4; }
.cat-daily      { background: rgba(236,72,153,.2); color: #f9a8d4; }

/* ── ACTION BUTTONS ── */
.acts {
  display: flex; gap: 10px; padding: 12px 16px;
  justify-content: center; flex-shrink: 0;
}
.ak {
  flex: 1; max-width: 140px;
  padding: 13px 8px; border-radius: 14px;
  font-size: 14px; font-weight: 600;
  cursor: pointer; border: none;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  transition: transform 0.1s, opacity 0.1s;
}
.ak:active { transform: scale(0.94); opacity: 0.85; }
.ak-icon { font-size: 18px; }
.ak-k { background: var(--green-bg); color: var(--green); border: 0.5px solid rgba(34,197,94,.3); }
.ak-f { background: var(--amber-bg); color: var(--amber); border: 0.5px solid rgba(245,158,11,.3); }
.ak-h { background: var(--red-bg);   color: var(--red);   border: 0.5px solid rgba(239,68,68,.3);  }

/* ── REVIEW LIST ── */
.review-wrap {
  flex-shrink: 0; padding: 0 16px 8px;
  max-height: 180px; display: none;
}
.review-wrap.show { display: block; }
.rhead {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; font-weight: 600; color: var(--text2);
  padding: 6px 0; border-bottom: 0.5px solid var(--border);
  margin-bottom: 6px;
}
.exp-btn {
  font-size: 11px; padding: 4px 12px; border-radius: 8px;
  background: var(--blue-bg); color: var(--blue);
  border: 0.5px solid rgba(59,130,246,.3); cursor: pointer;
  font-weight: 600;
}
.rlist { overflow-y: auto; max-height: 130px; }
.ri {
  display: flex; gap: 8px; padding: 5px 0;
  border-bottom: 0.5px solid var(--border);
  font-size: 12px; align-items: baseline;
}
.ri-ja { font-weight: 600; min-width: 80px; color: var(--text); }
.ri-vn { color: var(--text2); flex: 1; }
.ri-cat { font-size: 10px; padding: 1px 6px; border-radius: 12px; }

/* ── LOADING SCREEN ── */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px; z-index: 100;
}
.spinner {
  width: 40px; height: 40px; border-radius: 50%;
  border: 3px solid var(--border); border-top-color: var(--accent);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.load-text { color: var(--text2); font-size: 14px; }

/* ── DONE SCREEN ── */
.done-face { gap: 12px; }
.done-emoji { font-size: 48px; }
.done-title { font-size: 22px; font-weight: 700; color: var(--text); }
.done-sub { font-size: 14px; color: var(--text2); }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: calc(80px + var(--safe-bot)); left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3); color: var(--text);
  padding: 10px 20px; border-radius: 10px; font-size: 13px;
  opacity: 0; transition: opacity 0.3s, transform 0.3s;
  pointer-events: none; white-space: nowrap; z-index: 50;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── OFFLINE BADGE ── */
#offline-badge {
  display: none; position: fixed; top: calc(8px + var(--safe-top)); right: 12px;
  background: var(--amber-bg); color: var(--amber);
  font-size: 11px; padding: 3px 8px; border-radius: 8px;
  border: 0.5px solid rgba(245,158,11,.3); z-index: 40;
}
</style>
</head>
<body>

<div id="loading">
  <div class="logo">JP Cards</div>
  <div class="spinner"></div>
  <div class="load-text" id="load-msg">Loading vocabulary...</div>
</div>

<div id="offline-badge">Offline</div>
<div id="toast"></div>

<div id="app" style="display:none">
  <header>
    <div class="logo">JP Cards</div>
    <div class="hcontrols">
      <select id="cat">
        <option value="all">All</option>
        <option value="automotive">Automotive</option>
        <option value="software">Software</option>
        <option value="protocol">Protocol</option>
        <option value="linux">Linux</option>
        <option value="safety">Safety</option>
        <option value="business">Business</option>
        <option value="daily">Daily</option>
      </select>
      <select id="mode">
        <option value="j2v">JP → EN</option>
        <option value="v2j">EN → JP</option>
      </select>
      <button class="icon-btn" id="btnS" title="Shuffle">⇄</button>
      <button class="icon-btn" id="btnR" title="Reset">↺</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat s-got"><div class="stat-n" id="sK">0</div><div class="stat-l">Got it</div></div>
    <div class="stat s-not"><div class="stat-n" id="sH">0</div><div class="stat-l">Not yet</div></div>
    <div class="stat s-rem"><div class="stat-n" id="sR">0</div><div class="stat-l">Left</div></div>
  </div>

  <div class="card-area">
    <div class="scene" id="scene">
      <div class="flipper" id="flipper">
        <div class="face face-f">
          <span class="f-badge" id="fBadge"></span>
          <div class="f-word" id="fWord"></div>
          <div class="f-hint">tap to flip</div>
        </div>
        <div class="face face-b">
          <span class="f-badge" id="bBadge"></span>
          <div class="b-kana" id="bKana"></div>
          <div class="b-meaning" id="bMeaning"></div>
          <div class="b-exlabel">usage example</div>
          <div class="b-ex" id="bEx"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="acts">
    <button class="ak ak-k" id="btnK"><span class="ak-icon">✓</span>Got it</button>
    <button class="ak ak-f" id="btnF"><span class="ak-icon">↻</span>Flip</button>
    <button class="ak ak-h" id="btnH"><span class="ak-icon">✗</span>Not yet</button>
  </div>

  <div class="review-wrap" id="rp">
    <div class="rhead">
      <span>Not yet: <span id="rcnt">0</span></span>
      <button class="exp-btn" onclick="exportCSV()">Export CSV</button>
    </div>
    <div class="rlist" id="rlist"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
'use strict';

// ── State ──
let ALL = [], deck = [], idx = 0, flipped = false;
let hard = [], sc = { k: 0, h: 0 };
const STORAGE_KEY = 'jp_hard_v1';

// ── Load words.xlsx via SheetJS ──
async function loadWords() {
  msg('Fetching words.xlsx...');
  try {
    const res = await fetch('words.xlsx', { cache: 'no-cache' });
    if (!res.ok) throw new Error('fetch failed');
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(buf, { type: 'array' });
    const ws = wb.Sheets['words'];
    if (!ws) throw new Error('sheet "words" not found');
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
    // Skip header row
    ALL = rows.slice(1)
      .filter(r => r[0] && String(r[0]).trim())
      .map(r => ({
        ja:   String(r[0] || '').trim(),
        kana: String(r[1] || '').trim(),
        vn:   String(r[2] || '').trim(),
        ex:   String(r[3] || '').trim(),
        cat:  String(r[4] || 'daily').trim().toLowerCase(),
      }));
    msg(`Loaded ${ALL.length} words`);
  } catch (e) {
    msg('Failed to load — using offline cache');
    ALL = [];
  }

  // Load persisted "hard" list from localStorage
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) hard = JSON.parse(saved);
  } catch (_) { hard = []; }

  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    build();
  }, 300);
}

function msg(t) { document.getElementById('load-msg').textContent = t; }

// ── Helpers ──
function shuf(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}
function g(id) { return document.getElementById(id); }

// ── Build deck ──
function build() {
  const cat = g('cat').value;
  deck = cat === 'all' ? [...ALL] : ALL.filter(x => x.cat === cat);
  shuf(deck);
  idx = 0; flipped = false; sc = { k: 0, h: 0 };
  g('flipper').classList.remove('flipped');
  updateStats(); updateRP();
  if (ALL.length === 0) { g('fWord').textContent = 'No data'; g('prg') && (g('prg').textContent = ''); return; }
  loadCard();
}

// ── Render card ──
function loadCard() {
  if (idx >= deck.length) {
    showDone(); return;
  }
  const c = deck[idx];
  const mode = g('mode').value;
  const catClass = 'cat-' + c.cat;

  [g('fBadge'), g('bBadge')].forEach(b => {
    b.textContent = c.cat;
    b.className = 'f-badge ' + catClass;
  });

  if (mode === 'j2v') {
    g('fWord').textContent = c.ja;
    g('bKana').textContent = c.kana !== c.ja ? c.kana : '';
    g('bMeaning').textContent = c.vn;
  } else {
    g('fWord').textContent = c.vn.split('(')[0].trim();
    g('bKana').textContent = c.ja;
    g('bMeaning').textContent = c.kana !== c.ja ? c.kana : '';
  }
  g('bEx').textContent = c.ex;

  // progress in header
  const prg = `${idx + 1} / ${deck.length}`;
  document.querySelector('.logo').textContent = prg.length < 10 ? 'JP Cards' : '';
  updateStats();

  flipped = false;
  g('flipper').classList.remove('flipped');
  g('btnK').style.display = '';
  g('btnF').style.display = '';
  g('btnH').style.display = '';
}

function showDone() {
  g('flipper').classList.remove('flipped');
  g('fBadge').textContent = '';
  g('fBadge').className = 'f-badge';
  g('bBadge').textContent = '';
  g('fWord').innerHTML = `<span style="font-size:48px">🎉</span>`;
  document.querySelector('.f-hint').textContent = 'Tap shuffle to go again';
  g('bKana').textContent = '';
  g('bMeaning').textContent = `Got it: ${sc.k} · Not yet: ${sc.h}`;
  g('bEx').textContent = '';
  g('btnK').style.display = 'none';
  g('btnF').style.display = 'none';
  g('btnH').style.display = 'none';
  updateStats();
}

// ── Flip ──
function doFlip() {
  if (idx >= deck.length) return;
  flipped = !flipped;
  g('flipper').classList.toggle('flipped', flipped);
}

// ── Rate ──
function rate(r) {
  if (idx >= deck.length) return;
  const c = deck[idx];
  sc[r]++;
  if (r === 'h') {
    const e = hard.find(x => x.ja === c.ja);
    if (e) e.count++;
    else hard.push({ ...c, count: 1 });
    saveHard();
    updateRP();
  }
  updateStats();
  idx++;
  setTimeout(() => {
    g('flipper').classList.remove('flipped');
    loadCard();
  }, 120);
}

// ── UI updates ──
function updateStats() {
  g('sK').textContent = sc.k;
  g('sH').textContent = sc.h;
  g('sR').textContent = Math.max(0, deck.length - idx);
}

function updateRP() {
  const rp = g('rp');
  if (!hard.length) { rp.classList.remove('show'); return; }
  rp.classList.add('show');
  g('rcnt').textContent = hard.length;
  g('rlist').innerHTML = hard.map(c => `
    <div class="ri">
      <span class="ri-ja">${c.ja}</span>
      <span class="ri-vn">${c.vn.split('(')[0].trim()}</span>
      <span class="ri-cat cat-${c.cat}">${c.cat}</span>
    </div>`).join('');
}

// ── Persist hard list ──
function saveHard() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(hard)); } catch (_) {}
}

// ── Export CSV ──
function exportCSV() {
  if (!hard.length) { toast('Nothing to export yet'); return; }
  const bom = '\uFEFF';
  const hdr = '"Kanji","Furigana","Meaning","Example","Category","Times missed"\n';
  const rows = hard.map(c =>
    [c.ja, c.kana, c.vn, c.ex, c.cat, c.count]
      .map(v => `"${String(v).replace(/"/g, '""')}"`)
      .join(',')
  ).join('\n');
  const blob = new Blob([bom + hdr + rows], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'not_yet.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  toast('CSV exported!');
}

// ── Toast ──
function toast(msg, dur = 2200) {
  const el = g('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// ── Offline indicator ──
function updateOnline() {
  g('offline-badge').style.display = navigator.onLine ? 'none' : 'block';
}
window.addEventListener('online', updateOnline);
window.addEventListener('offline', updateOnline);
updateOnline();

// ── Event bindings ──
g('scene').addEventListener('click', e => {
  if (!e.target.closest('button')) doFlip();
});
g('btnF').addEventListener('click', e => { e.stopPropagation(); doFlip(); });
g('btnK').addEventListener('click', e => { e.stopPropagation(); rate('k'); });
g('btnH').addEventListener('click', e => { e.stopPropagation(); rate('h'); });
g('cat').addEventListener('change', build);
g('mode').addEventListener('change', () => { flipped = false; g('flipper').classList.remove('flipped'); loadCard(); });
g('btnS').addEventListener('click', build);
g('btnR').addEventListener('click', () => {
  hard = []; saveHard(); build(); toast('Reset!');
});

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(() => {
    console.log('SW registered');
  });
}

// ── Start ──
loadWords();
</script>
</body>
</html>
